name: Release

on:
  push:
    tags:
      - "v*"
      - "*-v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  meta:
    name: Validate release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      tag: ${{ steps.parse.outputs.tag }}
      is_prerelease: ${{ steps.parse.outputs.is_prerelease }}
      package_path: ${{ steps.parse.outputs.package_path }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: parse
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" =~ ^v[0-9] ]]; then
            PACKAGE_PATH="packages/core"
            VERSION="${TAG#v}"
          else
            COMPONENT="${TAG%-v*}"
            PACKAGE_PATH="packages/$COMPONENT"
            VERSION="${TAG#*-v}"
          fi

          if [[ ! -f "$PACKAGE_PATH/package.json" ]]; then
            echo "package path $PACKAGE_PATH does not exist for tag $TAG" >&2
            exit 1
          fi

          PKG_VERSION="$(node -p "require('./$PACKAGE_PATH/package.json').version")"
          if [[ "$VERSION" != "$PKG_VERSION" ]]; then
            echo "tag version $VERSION must match package.json version $PKG_VERSION" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "package_path=$PACKAGE_PATH" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  build-artifacts:
    name: Build
    runs-on: ubuntu-latest
    needs: meta
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .node-version
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: |
          pnpm --filter smapped-traces run build
          pnpm --filter "./${{ needs.meta.outputs.package_path }}" run build
      - name: Pack
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          pnpm --filter "./${{ needs.meta.outputs.package_path }}" pack --pack-destination dist
      - name: Upload artifact archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-assets
          path: dist/*.tgz

  create-release:
    name: Publish GitHub Release
    needs:
      - meta
      - build-artifacts
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-assets
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: ${{ needs.meta.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ needs.meta.outputs.is_prerelease == 'true' }}
          files: dist/*
          fail_on_unmatched_files: true
          make_latest: ${{ needs.meta.outputs.is_prerelease == 'false' && startsWith(github.ref_name, 'v') }}

      - name: Trigger release notes workflow
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          gh workflow run release-notes.yml \
            --field tag="${{ needs.meta.outputs.tag }}"

  attest-provenance:
    name: Attest Build Provenance
    needs:
      - create-release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - name: Download release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-assets
          path: dist
      - name: Attest release assets
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: |
            dist/*

  publish-npm:
    name: Publish to npm
    needs:
      - meta
      - create-release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Download release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-assets
          path: dist
      - name: Publish
        shell: bash
        run: |
          set -euo pipefail
          # Unset NODE_AUTH_TOKEN so npm falls through to OIDC trusted publisher
          # authentication. setup-node injects github.token here by default which
          # causes npm to fail with 404 when attempting npm registry auth.
          unset NODE_AUTH_TOKEN
          npm publish ./dist/*.tgz --access public --provenance
